name: CI

# Builds the AmbiTap-Max externals (universal x86_64 + arm64) on macOS and
# checks all 14 bundles came out fat. Both this repo and the AmbiTap submodule
# are public, so the default GITHUB_TOKEN suffices for the recursive checkout.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout (recursive — pulls min-api + AmbiTap)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (universal)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --parallel

      - name: Verify 14 universal externals
        run: |
          set -euo pipefail
          count=$(ls -d externals/*.mxo | wc -l | tr -d ' ')
          echo "built $count externals"
          if [ "$count" -ne 14 ]; then
            echo "::error::expected 14 externals, got $count"; exit 1
          fi
          fail=0
          for mxo in externals/*.mxo; do
            bin="$mxo/Contents/MacOS/$(basename "$mxo" .mxo)"
            archs=$(lipo -archs "$bin")
            echo "  $(basename "$mxo"): $archs"
            [ "$archs" = "x86_64 arm64" ] || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::one or more externals are not universal (x86_64 arm64)"; exit 1
          fi
          echo "all 14 externals are universal"
