name: CI

# Builds the AmbiTap-Max externals via the Min-DevKit CMake on macOS (universal
# x86_64 + arm64 .mxo) and Windows (.mxe64), checking all 18 externals and the 8 v8ui widget bundles come out.
# Both this repo and the AmbiTap submodule are public, so the default
# GITHUB_TOKEN suffices for the recursive checkout.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: build (macos)
    runs-on: macos-latest
    steps:
      - name: Checkout (recursive — pulls min-api + AmbiTap)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (universal)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --parallel

      - name: Verify 18 universal externals
        run: |
          set -euo pipefail
          count=$(ls -d externals/*.mxo | wc -l | tr -d ' ')
          echo "built $count externals"
          if [ "$count" -ne 18 ]; then
            echo "::error::expected 18 externals, got $count"; exit 1
          fi
          fail=0
          for mxo in externals/*.mxo; do
            bin="$mxo/Contents/MacOS/$(basename "$mxo" .mxo)"
            archs=$(lipo -archs "$bin")
            echo "  $(basename "$mxo"): $archs"
            [ "$archs" = "x86_64 arm64" ] || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::one or more externals are not universal (x86_64 arm64)"; exit 1
          fi
          echo "all 18 externals are universal"

      - name: Verify 8 v8ui widget bundles
        run: |
          set -euo pipefail
          count=$(ls javascript/*.js | wc -l | tr -d ' ')
          echo "built $count v8ui bundles:"
          ls javascript/
          if [ "$count" -ne 8 ]; then
            echo "::error::expected 8 v8ui bundles in javascript/, got $count"; exit 1
          fi

  windows:
    name: build (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout (recursive — pulls min-api + AmbiTap)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify 18 externals (.mxe64)
        shell: pwsh
        run: |
          $ext = Get-ChildItem -Recurse externals -Filter *.mxe64
          Write-Host "built $($ext.Count) externals"
          $ext | ForEach-Object { Write-Host "  $($_.Name)" }
          if ($ext.Count -ne 18) { throw "expected 18 .mxe64 externals, got $($ext.Count)" }
          Write-Host "all 18 externals built"

      - name: Verify 8 v8ui widget bundles
        shell: pwsh
        run: |
          $js = Get-ChildItem javascript -Filter *.js
          Write-Host "built $($js.Count) v8ui bundles"
          $js | ForEach-Object { Write-Host "  $($_.Name)" }
          if ($js.Count -ne 8) { throw "expected 8 v8ui bundles in javascript/, got $($js.Count)" }
